name: PR Test

on:
  workflow_dispatch:          # Actions에서 수동 실행 가능
  pull_request:
    branches: [ develop ]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        ports: [ "3306:3306" ]
        env:
          MYSQL_ROOT_PASSWORD: test1234
          MYSQL_DATABASE: gabom_test
          MYSQL_USER: gabom_user
          MYSQL_PASSWORD: test1234
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"
          --health-interval=10s --health-timeout=5s --health-retries=10

      redis:
        image: redis:6.2
        ports: [ "6379:6379" ]
        options: >-
          --health-cmd="redis-cli ping || exit 1"
          --health-interval=10s --health-timeout=5s --health-retries=10

    env:
      # 앱에서 참조하는 환경변수 이름에 맞춤 (application-dev.yml 기준)
      SERVER_PORT: 8080

      # MySQL - 컨테이너로 기동 (localhost로 접근)
      RDS_URL: localhost
      DEV_MYSQL_PORT: 3306
      DEV_MYSQL_DBNAME: gabom_test
      DEV_MYSQL_USERNAME: gabom_user
      DEV_MYSQL_PASSWORD: test1234

      # Redis
      REDIS_HOST: localhost
      REDIS_PORT: 6379

      # JWT
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      # 외부 연동 더미
      AWS_ACCESS_KEY: dummy
      AWS_SECRET_KEY: dummy
      AWS_BUCKET_NAME: gabom-bucket
      AWS_BUCKET_REGION: ap-northeast-2
      MAIL_USERNAME: test@example.com
      MAIL_PASSWORD: test-mail-pass

      # CI에선 dev 프로필로 고정
      PROFILE_ACTIVE: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1 && echo "MySQL up" && break
            echo "⏳ waiting mysql... $i"; sleep 2
          done

      # 진단 빌드: 에러 나도 즉시 종료하지 않고 리포트/코드 남김
      - name: Build (diagnostic; skip tests)
        shell: bash
        run: |
          set +e
          ./gradlew clean build -x test --no-daemon --warning-mode all --stacktrace --info
          BUILD_EXIT=$?

          echo "::group::Build Diagnostics"
          echo "Build exit code: $BUILD_EXIT"
          java -version || true
          ./gradlew -v || true
          echo "Reports under build/reports:"
          ls -R build/reports || true
          echo "::endgroup::"

          set -e
          echo "$BUILD_EXIT" > .build-exit

      # 진단 테스트: 테스트도 같은 방식으로 원인 수집
      - name: Test (diagnostic)
        shell: bash
        run: |
          set +e
          ./gradlew test --no-daemon --stacktrace --info
          TEST_EXIT=$?

          echo "::group::Test Diagnostics"
          echo "Test exit code: $TEST_EXIT"
          echo "Test reports under build/reports/tests:"
          ls -R build/reports/tests || true
          echo "::endgroup::"

          set -e
          echo "$TEST_EXIT" > .test-exit

      # 실패 시 리포트 아티팩트 업로드
      - name: Upload Gradle problem reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports
          path: |
            build/reports/problems/**
            build/reports/tests/**

      # 최종 종료 코드 반영 (하나라도 실패면 실패 처리)
      - name: Fail if build/test failed
        shell: bash
        run: |
          BUILD_EXIT=$(cat .build-exit)
          TEST_EXIT=$(cat .test-exit)
          echo "BUILD_EXIT=$BUILD_EXIT, TEST_EXIT=$TEST_EXIT"
          if [ "$BUILD_EXIT" -ne 0 ] || [ "$TEST_EXIT" -ne 0 ]; then
            exit 1
          fi