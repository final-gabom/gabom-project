name: PR Test

on:
  workflow_dispatch:          # Actions에서 수동 실행 가능
  pull_request:
    branches: [ develop ]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        ports: [ "3306:3306" ]
        env:
          MYSQL_ROOT_PASSWORD: test1234
          MYSQL_DATABASE: gabom_test
          MYSQL_USER: gabom_user
          MYSQL_PASSWORD: test1234
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"
          --health-interval=10s --health-timeout=5s --health-retries=10

      redis:
        image: redis:6.2
        ports: [ "6379:6379" ]
        options: >-
          --health-cmd="redis-cli ping || exit 1"
          --health-interval=10s --health-timeout=5s --health-retries=10

    env:
      # 앱에서 참조하는 환경변수 이름에 맞춤 (application-dev.yml 기준)
      SERVER_PORT: 8080

      # MySQL - 컨테이너로 기동 (localhost로 접근)
      RDS_URL: localhost
      DEV_MYSQL_PORT: 3306
      DEV_MYSQL_DBNAME: gabom_test
      DEV_MYSQL_USERNAME: gabom_user
      DEV_MYSQL_PASSWORD: test1234

      # Redis
      REDIS_HOST: localhost
      REDIS_PORT: 6379

      # JWT
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      # 외부 연동 더미
      AWS_ACCESS_KEY: dummy
      AWS_SECRET_KEY: dummy
      AWS_BUCKET_NAME: gabom-bucket
      AWS_BUCKET_REGION: ap-northeast-2
      MAIL_USERNAME: test@example.com
      MAIL_PASSWORD: test-mail-pass

      # CI에선 dev 프로필로 고정
      PROFILE_ACTIVE: dev

    steps:
      # 현재 저장소 소스를 워크플로우 환경(가상머신)으로 가져옴
      - name: Checkout
        uses: actions/checkout@v4

      # Java 17 환경을 설치해 Gradle 빌드/테스트를 실행할 수 있도록 설정
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # gradlew 스크립트에 실행 권한을 부여해 CI 환경에서 실행 가능하게 함
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # MySQL 컨테이너가 기동될 때까지 대기 후 다음 단계 진행
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1 && echo "MySQL up" && break
            echo "⏳ waiting mysql... $i"; sleep 2
          done

      # Gradle로 전체 테스트를 실행해 코드 동작과 기능을 검증
      - name: Run tests
        run: ./gradlew clean test --no-daemon --info

      # 테스트 실패 시, 실패 내역과 HTML 리포트 경로를 콘솔에 출력
      - name: Show test report if failed
        if: failure()
        run: |
          echo "==== TEST RESULTS (console) ===="
          ./gradlew test --stacktrace || true
          echo "==== TEST HTML REPORT PATH ===="
          echo "Check: build/reports/tests/test/index.html"

      # 테스트 실패 시, HTML/JUnit 리포트를 워크플로우 아티팩트로 업로드해 다운로드 가능하게 함
      - name: Upload test reports (if failed)
        if: failure()
        continue-on-error: true  # 경로가 없어도 실패로 처리하지 않음
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-reports
          path: |
            **/reports/tests/**
            **/test-results/test/**

      # 테스트 실패 시, --stacktrace 옵션으로 상세 에러 로그를 콘솔에 재출력
      - name: Show failed tests (console)
        if: failure()
        run: ./gradlew test --stacktrace || true