name: Create branch from issue

on:
  issues:
    types: [opened, labeled]

jobs:
  create-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Determine branch prefix
        id: extract
        run: |
          PREFIX="issue"

          if [[ "${{ github.event_name }}" == "labeled" ]]; then
            LABEL="${{ github.event.label.name }}"
          else
            LABELS=$(echo '${{ toJson(github.event.issue.labels) }}' | jq -r '.[].name')
            for l in $LABELS; do
              LABEL="$l"
              break
            done
          fi

          case "$LABEL" in
            feature) PREFIX="feat" ;;
            bug) PREFIX="fix" ;;
            refactor) PREFIX="refactor" ;;
            chore) PREFIX="chore" ;;
            docs) PREFIX="docs" ;;
            etc) PREFIX="etc" ;;
          esac

          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT

      - name: Create branch name
        id: branch
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          PREFIX=${{ steps.extract.outputs.prefix }}
          BRANCH_NAME="${PREFIX}/${ISSUE_NUMBER}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create and push branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin
          git checkout -b "${{ steps.branch.outputs.branch_name }}" origin/develop
          git push origin "${{ steps.branch.outputs.branch_name }}"

      - name: Comment on issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✅ 브랜치가 자동 생성되었습니다: `${{ steps.branch.outputs.branch_name }}`
            이 브랜치에서 작업을 시작해주세요.
