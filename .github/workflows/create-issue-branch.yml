name: Create branch from issue

on:
  issues:
    types: [opened, labeled]  # 이슈 생성과 라벨 부착 모두 대응

jobs:
  create-branch:
    if: github.event.action == 'opened' || github.event.action == 'labeled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Check labels and determine prefix
        id: extract
        run: |
          echo "라벨 목록: ${{ toJson(github.event.issue.labels) }}"
          LABELS=$(echo '${{ toJson(github.event.issue.labels) }}' | jq -r '.[].name')
          
          PREFIX="issue"

          for label in $LABELS; do
            NORMALIZED=$(echo "$label" | tr '[:upper:]' '[:lower:]')
            case "$NORMALIZED" in
              feature) PREFIX="feat"; break ;;
              bug) PREFIX="fix"; break ;;
              refactor) PREFIX="refactor"; break ;;
              chore) PREFIX="chore"; break ;;
              docs) PREFIX="docs"; break ;;
            esac
          done

          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT

      - name: Stop if prefix is issue (no matching label)
        if: steps.extract.outputs.prefix == 'issue'
        run: |
          echo "❌ 브랜치 생성에 해당하는 라벨이 없습니다. 건너뜁니다."
          exit 0

      - name: Create branch name
        id: branch
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          PREFIX=${{ steps.extract.outputs.prefix }}
          BRANCH_NAME="${PREFIX}/${ISSUE_NUMBER}"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create and push branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin
          git checkout -b "${{ steps.branch.outputs.branch_name }}" origin/develop
          git push origin "${{ steps.branch.outputs.branch_name }}"

      - name: Comment on issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✅ 브랜치가 자동 생성되었습니다: `${{ steps.branch.outputs.branch_name }}`
            이 브랜치에서 작업을 시작해주세요.
