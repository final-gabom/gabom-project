name: Deploy to EKS (develop)

on:
  push:
    branches:
      - es/TEST

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:6.2
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: admin
          RABBITMQ_DEFAULT_PASS: admin
        options: --health-cmd "rabbitmqctl status" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Print Redis Status
        run: echo "✅ Redis 기동 완료"

      - name: Print RabbitMQ Status
        run: echo "✅ RabbitMQ 기동 완료"

      - name: Check RDS MySQL connection
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
          mysql -h ${{ secrets.RDS_HOST }} -u${{ secrets.RDS_USER }} -p${{ secrets.RDS_PASSWORD }} -e "SHOW DATABASES;"
        env:
          MYSQL_PWD: ${{ secrets.RDS_PASSWORD }}

      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # Docker Build & Push 단계 추가
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-northeast-2 \
            | docker login --username AWS --password-stdin 675769453974.dkr.ecr.ap-northeast-2.amazonaws.com

      - name: Build and Push Docker image
        run: |
          docker build --no-cache -t 675769453974.dkr.ecr.ap-northeast-2.amazonaws.com/gabom-server:dev .
          docker push 675769453974.dkr.ecr.ap-northeast-2.amazonaws.com/gabom-server:dev

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.0

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ap-northeast-2 --name gabom-dev

      - name: Deploy to EKS using Kubernetes YAML
        run: kubectl apply -f k8s/dev/gabom-app.yml

      - name: Check Elasticsearch Connection from Pod
        run: |
          echo "⌛ Elasticsearch 연결 확인 중 (EKS 내부)..."
          echo "💤 애플리케이션 Pod 기동 대기 중..."
          sleep 20
          POD_NAME=$(kubectl get pods -n gabom -l app=gabom-api -o jsonpath="{.items[0].metadata.name}")
          kubectl exec -n gabom $POD_NAME -- curl --fail http://elasticsearch-master.gabom.svc.cluster.local:9200 || exit 1

      - name: Print Elasticsearch Status
        run: echo "✅ Elasticsearch 연결 성공"