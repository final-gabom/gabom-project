name: Deploy to Dev EC2

on:
  workflow_dispatch:   # 수동 실행
  push:
    branches:
      - develop

env:
  TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 레포 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # Java 17 세팅
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # gradlew 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 빌드 (테스트 제외)
      - name: Build project
        run: ./gradlew clean bootJar -x test --no-daemon

      # 배포용 압축파일 생성
      - name: Create deploy package
        run: |
          mkdir -p deploy
          cp build/libs/*.jar deploy/
          cp Dockerfile docker-compose.yml deploy/
          cp src/main/resources/application-dev.yml deploy/
          tar -czf deploy.tar.gz -C deploy .

      # EC2로 파일 전송
      - name: Upload package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "~/gabom"

      # EC2에서 배포 실행
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          envs: TAG
          script: |
            set -e
            cd ~/gabom
            tar xzf deploy.tar.gz
            SHORT_SHA=$(echo "${TAG}" | cut -c1-7)
            echo "Using TAG=${SHORT_SHA}"

            echo "[1/4] Stop old stack"
            docker compose down || true 
            docker rm -f gabom-container || true

            echo "[2/4] Build image (tag: dev & ${SHORT_SHA})"
            docker build -t gabom-server:dev -t gabom-server:${SHORT_SHA} .

            echo "[3/4] Compose up (force recreate)"
            TAG=${SHORT_SHA} docker compose up -d --force-recreate

            echo "[4/4] Cleanup dangling images"
            docker image prune -f