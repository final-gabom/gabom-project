name: Deploy to Dev EC2 (Docker Compose)

on:
  push:
    branches: [ ci-test/pr-deploy ]     # develop 브랜치 push/merge 시 자동 배포
  workflow_dispatch:          # Actions 탭에서 수동 실행 가능

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 소스 코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # JDK 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 빌드 (테스트 제외)
      - name: Build (skip tests)
        run: ./gradlew clean build -x test --no-daemon

      # 빌드 결과물/구성 파일 EC2로 전송 (.env는 제외)
      - name: Copy artifacts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          # EC2 호스트
          host: ${{ secrets.DEV_EC2_HOST }}

          # EC2 사용자명
          username: ubuntu

          # EC2 SSH 키
          key: ${{ secrets.DEV_EC2_SSH_KEY }}

          source: |
            build/libs/gabom-0.0.1-SNAPSHOT.jar
            Dockerfile
            docker-compose.yml
            src/main/resources/application-dev.yml

          # EC2 내 복사 경로
          target: ~/gabom

      # EC2에서 Docker Compose로 배포
      - name: Deploy on EC2 (Compose build & up)
        uses: appleboy/ssh-action@v1.0.3
        env:
          # 현재 커밋 SHA
          TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/gabom

            SHORT_SHA=$(echo "${TAG}" | cut -c1-7)
            echo "Using TAG=${SHORT_SHA}"

            echo "[1/5] Stop old stack"
            docker compose down || true 

            echo "[2/5] Build image (tag: dev & ${SHORT_SHA})"
            docker build -t gabom-server:dev -t gabom-server:${SHORT_SHA} .

            echo "[3/5] Compose up (force recreate)"
            TAG=${SHORT_SHA} docker compose up -d --force-recreate

            echo "[4/5] Health check"
            for i in {1..30}; do
              if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
                echo "✅ OK: actuator health"; break
              elif curl -fsS http://localhost:8080/ >/dev/null 2>&1; then
                echo "✅ OK: app root"; break
              else
                echo "⏳ Waiting for app... $i"; sleep 2
              fi
            done

            echo "[5/5] Cleanup dangling images"
            docker image prune -f

      # 실패 시, HTML/JUnit 리포트를 워크플로우 아티팩트로 업로드해 다운로드 가능하게 함
      - name: Upload deploy artifacts (if failed)
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          # 아티팩트 이름에 커밋 SHA 포함
          name: deploy-artifacts-${{ github.sha }}

          path: |
            build/libs/gabom-0.0.1-SNAPSHOT.jar
            Dockerfile
            docker-compose.yml
            src/main/resources/application-dev.yml