name: Deploy to Dev EC2 (Docker)

on:
  push:
    branches: [ develop ]   # develop에 머지/푸시되면 자동 실행
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for context only)
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build (skip tests)
        run: ./gradlew clean build -x test --no-daemon

      # .env는 레포에 없고 EC2에만 존재해야 함
      - name: Copy artifacts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          source: |
            build/libs/gabom-0.0.1-SNAPSHOT.jar
            Dockerfile
            src/main/resources/application-dev.yml
          target: ~/gabom

      - name: Deploy on EC2 (Docker build & run)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/gabom

            echo "[1/5] Stop old container if exists"
            docker rm -f gabom-dev || true

            echo "[2/5] Build image"
            docker build -t gabom-server:dev .

            echo "[3/5] Run container"
            docker run -d --name gabom-dev --restart=always \
              -p 8080:8080 \
              --env-file ~/gabom/.env \
              gabom-server:dev

            echo "[4/5] Health check"
            for i in {1..30}; do
              if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
                echo "OK: actuator health"; break
              elif curl -fsS http://localhost:8080/ >/dev/null 2>&1; then
                echo "OK: app root"; break
              else
                echo "⏳ waiting app... $i"; sleep 2
              fi
            done

            echo "[5/5] Done"