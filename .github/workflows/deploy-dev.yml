name: Deploy to Dev EC2 (Docker)

on:
  push:
    branches: [ develop ]    # develop 브랜치 push/merge 시 자동 배포
  workflow_dispatch:         # Actions 탭에서 수동 실행 가능

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 소스 코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # JDK 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4빌드 (테스트 제외)
      - name: Build (skip tests)
        run: ./gradlew clean build -x test --no-daemon

      # 빌드 결과물 EC2로 전송
      - name: Copy artifacts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_EC2_HOST }}       # EC2 호스트
          username: ubuntu                        # EC2 사용자명
          key: ${{ secrets.DEV_EC2_SSH_KEY }}     # EC2 SSH 키
          source: |
            build/libs/gabom-0.0.1-SNAPSHOT.jar   # 빌드된 JAR
            Dockerfile                            # Dockerfile
            src/main/resources/application-dev.yml # dev 환경 설정
          target: ~/gabom                         # EC2 내 복사 경로

      # EC2에서 Docker 빌드 & 컨테이너 실행
      - name: Deploy on EC2 (Docker build & run)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/gabom

            # 현재 커밋 SHA 앞 7자리 가져오기 (Docker 이미지 태그로 사용)
            COMMIT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)

            echo "[1/5] Stop old container if exists"
            docker rm -f gabom-dev || true

            echo "[2/5] Build image (tag: dev & $COMMIT_SHA)"
            docker build -t gabom-server:dev -t gabom-server:${COMMIT_SHA} .

            echo "[3/5] Run container"
            docker run -d --name gabom-dev --restart=always \
              -p 8080:8080 \
              --env-file ~/gabom/.env \
              gabom-server:dev

            echo "[4/5] Health check"
            for i in {1..30}; do
              if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
                echo "✅ OK: actuator health"; break
              elif curl -fsS http://localhost:8080/ >/dev/null 2>&1; then
                echo "✅ OK: app root"; break
              else
                echo "⏳ Waiting for app... $i"; sleep 2
              fi
            done

            echo "[5/5] Deployment complete"