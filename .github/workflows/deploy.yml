name: Deploy to EC2

on:                # 브랜치에 push되면 실행
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0         # GitHub에서 EC2로 SSH 접속 도와주는 액션
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/gabom
            git pull origin develop                 # EC2에서 자동으로 실행할 명령어들
            ./gradlew build -x test
            pkill -f 'java -jar' || true
            nohup java -jar build/libs/gabom-0.0.1-SNAPSHOT.jar > app.log 2>&1 &