apiVersion: v1
kind: Namespace
metadata:
  name: gabom
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gabom-api
  namespace: gabom
spec:
  replicas: 2
  selector:
    matchLabels: { app: gabom-api }
  template:
    metadata:
      labels: { app: gabom-api }
    spec:
      containers:
        - name: api
          image: 675769453974.dkr.ecr.ap-northeast-2.amazonaws.com/gabom-server:dev
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: gabom-svc
  namespace: gabom
spec:
  type: NodePort
  selector: { app: gabom-api }
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gabom-ing
  namespace: gabom
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gabom-svc
                port:
                  number: 80