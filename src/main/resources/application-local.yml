server:
  port: 8080
  error:
    include-stacktrace: always

logging:
  level:
    com.explorer.gabom: debug

spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gabom?serverTimezone=Asia/Seoul
    username: ${LOCAL_MYSQL_USERNAME}
    password: ${LOCAL_MYSQL_PASSWORD}

  data:
    redis:
      port: 6379
      host: localhost

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin

  elasticsearch:
    url: ${elasticsearch.url}
    username: elastic
    password: ${ES_PASSWORD}

  # 이메일 인증 시 필요
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO_POLICY}
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ap-northeast-2
      s3:
        bucket: ${AWS_BUCKET_NAME}
        key:
          prefix: test/

place:
  import:
    enabled: ${PLACE_IMPORT_ENABLED:false} # 기본값 false
address:
  import:
    enabled: ${ADDRESS_IMPORT_ENABLED:false}

jwt:
  secret: "localsecretkeylocalsecretkeylocalsecretkeylocalsecretkey"
  access-expiration: 3600000  # 1시간
  refresh-expiration: 1209600000  # 14일

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: http://localhost:8080/api/auth/kakao
            authorization-grant-type: authorization_code
            scope:
              - profile
              - account_email

springdoc:
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  cache:
    disabled: true
  api-docs:
    groups:
      enabled: true
  swagger-ui:
    enabled: true               # Swagger UI 사용여부 : 접근 경로 => <http://localhost:8080/swagger-ui/index.html>
    tags-sorter: alpha          # alpha: 알파벳 순 태그 정렬, method: HTTP Method 순 정렬
    operations-sorter: alpha

    exploration:
      duration:
        hours: 3              # 운영 기본값 유지
      test:
        duration-seconds: 40  # 로컬: 시작 후 40초에 만료(= 바로 확인)
      alarm:
        almost-minutes: 30    # 운영 기본(유지)
        almost-seconds: 10    # 로컬: 만료 10초 전에 임박 알림
